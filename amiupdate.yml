app_name: nvme
description: "Native NVMe block device driver for AmigaOS 4.1 Final Edition"

# Block devices live in DEVS:.  Kickstart integration (for boot-disk
# use) is documented in the readme and is a manual move.
default_path: "DEVS:"
use_appdir: false

# Files inside the archive drawer (tests/dist/nvme/).
# `critical` → installed via CopyStore (rollback-capable on update).
# `extra` → installed via Copy (no rollback, saves disk space).
files:
  critical:
    - source: nvme.device
      dest_name: nvme.device

  extra:
    - source: nvme.device.debug
      dest_name: nvme.device.debug
    - source: test_nvme
      dest_name: test_nvme
    - source: nvme_stats
      dest_name: nvme_stats
    - source: nvme.readme
      dest_name: nvme.readme
    - source: diskboot.config.sample
      dest_name: diskboot.config.sample

post_install_message: |
  nvme.device is now installed in DEVS:

  Quick start:
    - Mount an NVMe volume:     Mount DH0: FROM DEVS:DOSDrivers/NVMe0
    - Read live statistics:     nvme_stats
    - Watch stats every second: nvme_stats -w 0 1

  For boot-drive use, copy nvme.device into your Kickstart: drawer and
  add this line to Kickstart:diskboot.config:

      nvme.device 1 1

  See DEVS:nvme.readme for full details.
